{% extends 'base.html' %}

{% block title %}
Edit Student
{% endblock %}

{% block content %}

<div class="row justify-content-center">


<div class="col-lg-6 col-md-8">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3 class="mb-0 text-center">
                Edit Student
            </h3>

        </div>

        <div class="card-body">

            <form method="POST"
                  enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">
                        Student Name
                    </label>

                    <input type="text"
                           name="name"
                           value="{{ student.name }}"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Age
                    </label>

                    <input type="number"
                           name="age"
                           value="{{ student.age }}"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Course
                    </label>

                    <input type="text"
                           name="course"
                           value="{{ student.course }}"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Change Photo
                    </label>

                    <input type="file"
                           name="photo"
                           class="form-control"
                           accept="image/*">

                </div>

                {% if student.photo %}

                <div class="mb-3 text-center">

                    <img src="{{ url_for('static', filename='uploads/' + student.photo) }}"
                         width="120"
                         class="img-thumbnail">

                </div>

                {% endif %}

                <button type="submit"
                        class="btn btn-warning w-100">

                    Update Student

                </button>

            </form>

        </div>

    </div>

</div>


</div>

{% endblock %}
